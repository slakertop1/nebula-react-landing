<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nebula — аналитика, которая опережает</title>
    <meta name="description" content="Демо-лендинг на React: анимации, интерактив, адаптив. Портфолио slakertop1." />
    <script>
      // выставляем тему до первой отрисовки — чтобы не мигало
      (function () {
        var t = localStorage.getItem('nebula-theme') || 'dark'
        document.documentElement.setAttribute('data-theme', t)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
